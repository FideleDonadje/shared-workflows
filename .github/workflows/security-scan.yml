name: Security Scan

on:
  workflow_call:
    inputs:
      iac_type:
        description: "IaC framework in the calling repo: terraform or cdk"
        required: false
        default: "terraform"
        type: string
    secrets:
      CDK_SYNTH_ROLE_ARN:
        description: "IAM role ARN for cdk synth (required when iac_type is cdk)"
        required: false

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:

  # ── Job 1: Secret Detection ──────────────────────────────────────────────────
  gitleaks:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: gitleaks detect --source . --report-format sarif --report-path gitleaks.sarif
        continue-on-error: false

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@a723e99345b89ee0bbcbd68ee4e63f9a56b42a25 # v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  # ── Job 2: IaC Scanning ──────────────────────────────────────────────────────
  # For CDK repos: package.json lives inside cdk/ subdirectory.
  # Lambda deps are installed before synth so esbuild can bundle successfully.
  # set +e captures Checkov exit code so SARIF upload always runs even on findings.
  checkov:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        if: inputs.iac_type == 'cdk'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cdk/package-lock.json

      - name: Install CDK dependencies
        if: inputs.iac_type == 'cdk'
        run: cd cdk && npm ci

      - name: Install AWS CDK CLI
        if: inputs.iac_type == 'cdk'
        run: npm install -g aws-cdk

      - name: Install Lambda dependencies
        if: inputs.iac_type == 'cdk'
        run: |
          find lambda -name "package.json" \
            -not -path "*/node_modules/*" | while read pkg; do
              dir=$(dirname "$pkg")
              echo "Installing deps in $dir"
              (cd "$dir" && npm install)
            done

      - name: Configure AWS credentials via OIDC
        if: inputs.iac_type == 'cdk'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.CDK_SYNTH_ROLE_ARN }}
          aws-region: us-east-1

      - name: Synth CDK app
        if: inputs.iac_type == 'cdk'
        run: cd cdk && cdk synth

      - name: Setup Python for Checkov
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov on Terraform
        if: inputs.iac_type == 'terraform'
        run: |
          set +e
          checkov -d . \
            --framework terraform \
            --output sarif \
            --output-file-path . \
            --quiet
          CHECKOV_EXIT=$?
          mv results_sarif.sarif checkov.sarif
          exit $CHECKOV_EXIT

      - name: Run Checkov on CDK synth output
        if: inputs.iac_type == 'cdk'
        run: |
          set +e
          checkov -d cdk/cdk.out \
            --framework cloudformation \
            --output sarif \
            --output-file-path . \
            --quiet
          CHECKOV_EXIT=$?
          mv results_sarif.sarif checkov.sarif
          exit $CHECKOV_EXIT

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@a723e99345b89ee0bbcbd68ee4e63f9a56b42a25 # v3
        with:
          sarif_file: checkov.sarif
          category: checkov

  # ── Job 3: SAST ──────────────────────────────────────────────────────────────
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep.sarif \
            --error
        continue-on-error: false

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@a723e99345b89ee0bbcbd68ee4e63f9a56b42a25 # v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── Job 4: SCA — Node.js ─────────────────────────────────────────────────────
  npm-audit:
    name: "SCA — Node.js (npm audit)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Audit all Node.js dependency trees
        run: |
          find . -name "package.json" \
            -not -path "*/node_modules/*" \
            -not -name "package-lock.json" | while read pkg; do
              dir=$(dirname "$pkg")
              echo "──────────────────────────────────────"
              echo "Auditing: $dir"
              echo "──────────────────────────────────────"
              (cd "$dir" && npm install --package-lock-only --ignore-scripts 2>/dev/null || true)
              (cd "$dir" && npm audit --audit-level=high)
            done

  # ── Job 5: SCA — Python ──────────────────────────────────────────────────────
  pip-audit:
    name: "SCA — Python (pip-audit)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit all Python dependency manifests
        run: |
          FOUND=0
          find . -name "requirements*.txt" \
            -not -path "*/node_modules/*" | while read req; do
              echo "──────────────────────────────────────"
              echo "Auditing: $req"
              echo "──────────────────────────────────────"
              FOUND=1
              pip-audit -r "$req"
            done
          if [ "$FOUND" -eq 0 ]; then
            echo "No requirements*.txt files found. Skipping pip-audit."
          fi